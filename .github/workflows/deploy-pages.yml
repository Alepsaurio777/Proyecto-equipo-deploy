# Deploy Frontend to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, fusion-prueba, gh-pages-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build  # asegura que genere en build/ o dist/ según tu outDir

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build   # si tu outDir es build; cámbialo a ./dist si usas el default de Vite

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
