<!-- MODAL: PRODUCTO -->
<div id="productModal" class="modal-overlay hidden">
    <div class="modal">
        <div class="modal-header">
            <h3 id="productModalTitle">Nuevo Producto</h3>
        </div>
        <div class="modal-body">
            <form id="productForm">
                <div class="form-group">
                    <label class="form-label">Nombre del Producto *</label>
                    <input type="text" id="productName" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Código *</label>
                    <input type="text" id="productCode" class="form-input" required />
                </div>
                <div class="form-group">
                    <label class="form-label">Categoría *</label>
                    <select id="productCategory" class="form-select" required>
                        <option value="">Selecciona una categoría</option>
                        <option value="Herramientas">Herramientas</option>
                        <option value="Construcción">Construcción</option>
                        <option value="Electricidad">Electricidad</option>
                        <option value="Plomería">Plomería</option>
                        <option value="Pintura">Pintura</option>
                        <option value="Seguridad">Seguridad</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Stock Actual</label>
                    <input type="number" id="productStock" class="form-input" value="0" min="0" />
                </div>
                <div class="form-group">
                    <label class="form-label">Stock Mínimo</label>
                    <input type="number" id="productMinStock" class="form-input" value="0" min="0" />
                </div>
                <div class="form-group">
                    <label class="form-label">Stock Máximo</label>
                    <input type="number" id="productMaxStock" class="form-input" value="100" min="0" />
                </div>
                <div class="form-group">
                    <label class="form-label">Precio</label>
                    <input type="number" id="productPrice" class="form-input" value="0" min="0" step="0.01" />
                </div>
                <div class="form-group">
                    <label class="form-label">Ubicación</label>
                    <input type="text" id="productLocation" class="form-input" />
                </div>
                <div class="form-group">
                    <label class="form-label">Descripción</label>
                    <textarea id="productDescription" class="form-textarea"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button id="closeProductModalBtn" class="btn btn-outline">Cancelar</button>
            <button id="saveProductBtn" class="btn btn-primary">Guardar</button>
        </div>
    </div>
</div>
