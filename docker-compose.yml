version: "3.8"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ferreteria_db
    volumes:
      - db_data:/var/lib/mysql
      - ./api/database2.sql:/docker-entrypoint-initdb.d/database2.sql:ro
    ports:
      - "3306:3306"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin:5.1
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - db

  frontend_prod:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  frontend:
    image: node:18
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  db_data:
