<div id="productModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="productModalTitle">Nuevo Producto</h3>
            <button class="modal-close" id="closeProductModalBtn">&times;</button>
        </div>
        <form id="productForm" class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="productName">Nombre del Producto *</label>
                    <input type="text" id="productName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="productCode">Código *</label>
                    <input type="text" id="productCode" class="form-input" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="productCategory">Categoría *</label>
                    <input type="text" id="productCategory" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Precio *</label>
                    <input type="number" id="productPrice" class="form-input" step="0.01" min="0" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="productStock">Stock Actual</label>
                    <input type="number" id="productStock" class="form-input" min="0" value="0">
                </div>
                <div class="form-group">
                    <label for="productMinStock">Stock Mínimo</label>
                    <input type="number" id="productMinStock" class="form-input" min="0" value="0">
                </div>
                <div class="form-group">
                    <label for="productMaxStock">Stock Máximo</label>
                    <input type="number" id="productMaxStock" class="form-input" min="0" value="100">
                </div>
            </div>
            <div class="form-group">
                <label for="productLocation">Ubicación</label>
                <input type="text" id="productLocation" class="form-input" placeholder="Ej: Pasillo A - Estante 2">
            </div>
            <div class="form-group">
                <label for="productDescription">Descripción</label>
                <textarea id="productDescription" class="form-input" rows="3"></textarea>
            </div>
        </form>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="closeProductModalBtn2">Cancelar</button>
            <button type="button" class="btn btn-primary" id="saveProductBtn">Guardar</button>
        </div>
    </div>
</div>
