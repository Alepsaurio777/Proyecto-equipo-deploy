<div id="transactionModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Registrar Movimiento</h3>
            <button class="modal-close" id="closeTransactionModalBtn">&times;</button>
        </div>
        <form id="transactionForm" class="modal-body">
            <div class="form-group">
                <label for="transactionProduct">Producto *</label>
                <select id="transactionProduct" class="form-select" required>
                    <option value="">Selecciona un producto</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="transactionType">Tipo de Movimiento *</label>
                    <select id="transactionType" class="form-select" required>
                        <option value="">Selecciona tipo</option>
                        <option value="entrada">Entrada</option>
                        <option value="salida">Salida</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="transactionQuantity">Cantidad *</label>
                    <input type="number" id="transactionQuantity" class="form-input" min="1" required>
                </div>
            </div>
            <div class="form-group">
                <label for="transactionReason">Motivo</label>
                <textarea id="transactionReason" class="form-input" rows="3" placeholder="Describe el motivo del movimiento..."></textarea>
            </div>
        </form>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="closeTransactionModalBtn2">Cancelar</button>
            <button type="button" class="btn btn-primary" id="saveTransactionBtn">Registrar</button>
        </div>
    </div>
</div>
