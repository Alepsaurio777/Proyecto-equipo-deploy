<!-- MODAL: CAMBIAR CONTRASEÑA -->
<div id="changePasswordModal" class="modal-overlay hidden">
    <div class="modal" style="max-width: 400px">
        <div class="modal-header">
            <h3>🔒 Cambiar Contraseña</h3>
        </div>
        <div class="modal-body">
            <form id="changePasswordForm">
                <div class="form-group">
                    <label class="form-label">Contraseña Actual *</label>
                    <div class="input-with-icon">
                        <input type="password" id="changeCurrentPassword" class="form-input" required
                            autocomplete="current-password" style="padding-right: 2.5rem" />
                        <button type="button" class="password-toggle"
                            onclick="togglePasswordVisibility('changeCurrentPassword')"
                            title="Mostrar/Ocultar contraseña">
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Nueva Contraseña *</label>
                    <div class="input-with-icon">
                        <input type="password" id="changeNewPassword" class="form-input" required minlength="6"
                            autocomplete="new-password" style="padding-right: 2.5rem" />
                        <button type="button" class="password-toggle"
                            onclick="togglePasswordVisibility('changeNewPassword')" title="Mostrar/Ocultar contraseña">
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <small class="text-muted">Mínimo 6 caracteres</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmar Nueva Contraseña *</label>
                    <div class="input-with-icon">
                        <input type="password" id="changeConfirmPassword" class="form-input" required minlength="6"
                            autocomplete="new-password" style="padding-right: 2.5rem" />
                        <button type="button" class="password-toggle"
                            onclick="togglePasswordVisibility('changeConfirmPassword')"
                            title="Mostrar/Ocultar contraseña">
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeChangePasswordModal()">
                Cancelar
            </button>
            <button class="btn btn-primary" onclick="saveNewPassword()">
                Cambiar Contraseña
            </button>
        </div>
    </div>
</div>
