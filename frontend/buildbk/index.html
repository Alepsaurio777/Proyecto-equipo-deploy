<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferretería El Tornillo - Sistema de Gestión Integral</title>
  <link rel="stylesheet" crossorigin href="./assets/main-Bh1jcHbB.css">
  <link rel="stylesheet" href="./styles/main.css">
</head>

<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ==================== PANTALLA DE LOGIN ==================== -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="text-center">
        <div class="login-logo">🏪</div>
        <!-- poner img-->
        <h1>Ferretería El Tornillo</h1>
        <p class="login-subtitle">Sistema de Gestión Integral</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Usuario</label>
          <div class="input-with-icon">
            <svg class="input-icon svg-icon" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="loginUsername" class="form-input" placeholder="Ingresa tu usuario" required
              autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-with-icon">
            <svg class="input-icon svg-icon" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="loginPassword" class="form-input" placeholder="Ingresa tu contraseña" required
              autocomplete="current-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Iniciar Sesión
        </button>

        <div class="text-center" style="margin-top: 1rem">
          <button type="button" class="btn-link" onclick="showPasswordRecovery()">
            Olvidé mi contraseña
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ==================== APLICACIÓN PRINCIPAL ==================== -->
  <div id="mainApp" class="main-app hidden">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="header-icon">🏪</div>
        <div class="header-title">
          <h1>Ferretería El Tornillo</h1>
          <p>Sistema de Gestión de Inventario</p>
        </div>
        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-toggle" onclick="toggleMobileMenu()" aria-label="Abrir menú">
          <svg class="svg-icon" viewBox="0 0 24 24">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Sidebar Overlay (for mobile) -->
      <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeMobileMenu()"></div>
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <button class="btn btn-ghost btn-icon" onclick="toggleSidebar()">
            <svg class="svg-icon" viewBox="0 0 24 24">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="user-info">
            <p class="user-name" id="userName"></p>
            <p class="user-role" id="userRole"></p>
          </div>
        </div>

        <nav class="sidebar-nav" id="sidebarNav"></nav>

        <div class="sidebar-footer">
          <button class="nav-item" id="editProfileBtn" onclick="showEditProfile()">
            <svg class="nav-icon svg-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M12 1v6m0 6v6"></path>
            </svg>
            <span class="nav-text">Editar Perfil</span>
          </button>
          <button class="nav-item" onclick="showLogoutDialog()">
            <svg class="nav-icon svg-icon" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span class="nav-text">Cerrar Sesión</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="mainContent"></main>
    </div>
  </div>

  <!-- ==================== CONTENEDOR DE MODALES (cargados dinámicamente) ==================== -->
  <div id="modalsContainer"></div>

  <!-- ==================== LIBRERÍAS PARA EXPORTAR ==================== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- ==================== SCRIPTS MODULARES ==================== -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/template-loader.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/inventory/inventory-validation.js"></script>
  <script src="js/inventory/inventory-data.js"></script>
  <script src="js/inventory/inventory-ui.js"></script>
  <script src="js/inventory/inventory-main.js"></script>
  <script src="js/employees.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <!-- Cargar modales al iniciar -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      loadModals();
    });
  </script>
</body>

</html>
